# Flatpak manifest for eSim - Cross-distribution Linux support
# Works on Fedora, Ubuntu, openSUSE, Arch Linux, and other distributions
# See https://docs.flatpak.org/en/latest/flatpak-builder.html for build instructions
#
# Build: flatpak-builder build flatpak/org.fossee.eSim.yml --install --user
# Run:   flatpak run org.fossee.eSim
#
# Optional: Install KiCad from Flathub for schematic editing:
#   flatpak install flathub org.kicad.KiCad

app-id: org.fossee.eSim
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk

finish-args:
  - --device=dri
  - --filesystem=home
  - --share=ipc
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --talk-name=org.freedesktop.Flatpak
  - --env=ESIM_FLATPAK=1

command: esim

modules:
  # Ngspice - circuit simulator (required for eSim simulations) - v46
  - name: ngspice
    buildsystem: autotools
    config-opts:
      - --disable-silent-rules
      - --enable-xspice
      - --enable-cider
      - --enable-openmp
      - --with-ngshared
    sources:
      - type: archive
        url: https://sourceforge.net/projects/ngspice/files/ng-spice-rework/46/ngspice-46.tar.gz/download
        sha256: a0d1699af1940b06649276dcd6ff5a566c8c0cad01b2f7b5e99dedbb4d64c19b
        dest-filename: ngspice-46.tar.gz

  # Python dependencies - all wheels pre-downloaded so pip can install offline.
  # The flatpak build phase has no network access; network is only available to
  # the running app via finish-args. All URLs and sha256s are from PyPI.
  - name: python-deps
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --find-links=wheels --prefix=/app
          PyQt6-Qt6 PyQt6-sip PyQt6
          numpy matplotlib contourpy cycler fonttools kiwisolver
          packaging pillow pyparsing python-dateutil six
          scipy watchdog psutil
